<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffd6e8" />

    <!-- iOS/Android "Add to Home Screen" hygiene (PLAN-03 task 4): makes the
         game launch looking like a real app instead of a browser bookmark.
         The apple-mobile-web-app-* tags are Apple's legacy names but still
         the only ones iOS Safari honors; mobile-web-app-capable is the
         modern cross-browser equivalent (kept alongside, not instead of).
         The icon below is the real cute-tulip art generated by the src/art
         pipeline (npm run art -> public/apple-touch-icon.png; PLAN-10 ST-4b). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gabby is 22!!" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>Gabby is 22!!</title>
    <style>
      @font-face {
        font-family: 'Press Start 2P';
        src: url('/assets/fonts/PressStart2P-Regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffd6e8;
        touch-action: manipulation;
        /* Mobile page hygiene (PLAN-03 task 4) — this is a full-screen game,
           not a document, so every browser gesture that could compete with
           gameplay input gets turned off: */
        overscroll-behavior: none; /* no pull-to-refresh, no overscroll bounce/chaining */
        -webkit-user-select: none;
        user-select: none; /* no text-selection highlight from a long-press */
        -webkit-touch-callout: none; /* no iOS long-press callout (copy/save-image) menu */
      }

      #app {
        width: 100%;
        height: 100%;
      }

      #app canvas {
        display: block;
        /* The canvas IS the touch pedals (PLAN-03 task 2): `none` stops the
           browser from ever interpreting a pedal press as a scroll/zoom
           gesture, on top of the page-level rules above. */
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
